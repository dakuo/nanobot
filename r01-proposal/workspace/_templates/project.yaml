# NIH R01 Proposal Project Configuration
# Copy this file to your project folder and rename to project.yaml
# Fill in all fields before running the pipeline

# ---------------------------------------------------------------------------
# Project Metadata
# ---------------------------------------------------------------------------
name: "Untitled R01 Proposal"
shortname: "untitled-r01"          # used for folder names and Slack channels
created_at: null                   # ISO-8601, set by orchestrator on init
updated_at: null                   # ISO-8601, updated on every pipeline event

# ---------------------------------------------------------------------------
# Investigators
# At minimum, provide PI name and institution. scholar_id enables automatic
# publication fetching for literature self-citation and team credibility.
# co_investigators and key_personnel drive budget personnel and reviewer
# "Investigator" dimension scoring.
# If left empty, the system prompts for this at Phase 0.5 (metadata collection).
# ---------------------------------------------------------------------------
investigators:
  pi:
    name: null                       # "Dr. Jane Smith"
    institution: null                # "Stanford University"
    department: null                 # "Division of Gastroenterology and Hepatology"
    scholar_id: null                 # Google Scholar ID or ORCID (e.g., "0000-0002-1234-5678")
    expertise: []                    # ["human-centered AI", "clinical informatics"]
  co_investigators:
    # - name: "Dr. John Doe"
    #   institution: "Stanford University"
    #   role: "Co-I, HCI Lead"
    #   expertise: ["human-centered design", "health informatics"]
    #   scholar_id: null
    #   effort_percent: 20           # % effort on this project
    # - name: "Dr. Sarah Kim"
    #   role: "Co-I, AI Lead"
    #   expertise: ["clinical ML", "multimodal learning"]
    #   scholar_id: null
    #   effort_percent: 15
  key_personnel:
    # - name: "Alex Johnson"
    #   role: "Biostatistician"
    #   effort_percent: 10
    # - name: "Maria Garcia"
    #   role: "Project Coordinator"
    #   effort_percent: 50

# ---------------------------------------------------------------------------
# NIH Context
# target_institute: NIH IC code (e.g., NIDDK, NIBIB, NCI, NIA, NIMH).
#   If null, the r01-foa-finder agent searches for appropriate ICs.
# clinical_trial_classification: Determines which Parent R01 NOFO applies:
#   "not_allowed"  → PA-25-301 (no clinical trial component)
#   "optional"     → PA-25-302 (may include clinical trial)
#   "required"     → PA-25-303 (must include clinical trial)
# foa: Specific Funding Opportunity Announcement (e.g., PAR-26-042).
#   If null, the system recommends Parent R01 + relevant Highlighted Topics.
# If any field is null, Phase 0.5 (metadata collection) will prompt the user
# or run r01-foa-finder to infer appropriate values.
# ---------------------------------------------------------------------------
nih_context:
  target_institute: null             # "NIDDK" | "NIBIB" | "NCI" | etc.
  clinical_trial_classification: null  # "not_allowed" | "optional" | "required"
  foa:
    number: null                     # "PA-25-302" or "PAR-26-042"
    title: null                      # "Parent R01 (Clinical Trial Optional)"
    type: null                       # "PA" | "PAR" | "PAS" | "RFA"
  highlighted_topics: []             # auto-populated by r01-foa-finder if relevant
  program_officers: []               # auto-populated by r01-foa-finder from NIH Reporter

# ---------------------------------------------------------------------------
# Submission Timeline
# cycle: Next R01 standard receipt date (Feb 5, Jun 5, Oct 5).
# type: "new" (first submission), "resubmission" (A1), "renewal" (continuation).
# project_start: Estimated start (~9 months after submission).
# budget_period_years: Typically 5 for R01.
# If null, the system calculates based on next available cycle.
# ---------------------------------------------------------------------------
submission:
  cycle: null                        # "2026-10-05" (YYYY-MM-DD)
  type: "new"                        # "new" | "resubmission" | "renewal"
  resubmission_suffix: null          # "A1" if resubmission, null otherwise
  project_start: null                # "2027-07-01" (estimated)
  project_end: null                  # "2032-06-30" (project_start + budget_period - 1 day)
  budget_period_years: 5

# ---------------------------------------------------------------------------
# Scientific Topic
# ---------------------------------------------------------------------------
topic: >
  Describe the core scientific question, clinical problem, or technological
  gap this proposal addresses. Be specific enough that the ideation agent
  can generate focused specific aims (2–4 sentences recommended).

# ---------------------------------------------------------------------------
# Domain Tags
# Drives aim-to-writer routing. Each aim inherits one primary domain tag.
# Valid values: hci | healthcare | ai
# ---------------------------------------------------------------------------
domain_tags:
  - hci
  - healthcare
  - ai

# ---------------------------------------------------------------------------
# Specific Aims
# Supports 2-4 aims. Add or remove aim entries as needed.
# The pipeline dynamically generates writing batches, state tracking, and
# reviewer coverage based on the number of aims defined here.
# domain_tag must match one of the values in domain_tags above.
# lead_writer maps to the corresponding r01-writer-<domain_tag> skill.
# page_budget is the aim's share of the Approach section (pages).
# ---------------------------------------------------------------------------
aims:
  - title: "Aim 1: Establish and characterize [phenomenon/system]"
    domain_tag: hci
    lead_writer: r01-writer-hci
    page_budget: 3

  - title: "Aim 2: Develop and validate [intervention/algorithm]"
    domain_tag: ai
    lead_writer: r01-writer-ai
    page_budget: 3

  - title: "Aim 3: Evaluate [outcome/deployment] in [population/context]"
    domain_tag: healthcare
    lead_writer: r01-writer-healthcare
    page_budget: 3

  # Uncomment for a 4-aim proposal:
  # - title: "Aim 4: Integrate and deploy [system] in [real-world setting]"
  #   domain_tag: hci        # or any domain_tag
  #   lead_writer: r01-writer-hci
  #   page_budget: 2

# ---------------------------------------------------------------------------
# Page Budgets (NIH R01 standard: 12-page Research Strategy)
# specific_aims is a separate 1-page attachment.
# Total Research Strategy = significance + innovation + approach = 12 pages.
# ---------------------------------------------------------------------------
page_budgets:
  specific_aims: 1
  significance: 3
  innovation: 2
  approach: 9
  total: 15                        # includes specific_aims page

# ---------------------------------------------------------------------------
# Word Count Targets
# Approximate words per page for NIH-formatted documents (11pt Arial, 0.5in margins).
# ---------------------------------------------------------------------------
word_count_targets:
  words_per_page: 500
  specific_aims: 500
  significance: 1500
  innovation: 1000
  approach: 4500
  total: 7500

# ---------------------------------------------------------------------------
# Model Configuration
# default_model is used by all skills unless overridden below.
# Override keys must match exact skill names.
# ---------------------------------------------------------------------------
model_config:
  default_model: "claude-opus-4-5"
  overrides:
    r01-orchestrator: "claude-opus-4-5"
    r01-ideation: "claude-opus-4-5"
    r01-novelty-checker: "claude-sonnet-4-5"   # search-heavy, Sonnet is cost-effective
    r01-literature: "claude-sonnet-4-5"
    r01-writer-hci: "claude-opus-4-5"
    r01-writer-healthcare: "claude-opus-4-5"
    r01-writer-ai: "claude-opus-4-5"
    r01-writer-integrator: "claude-opus-4-5"
    r01-reviewer-hci: "claude-sonnet-4-5"
    r01-reviewer-healthcare: "claude-sonnet-4-5"
    r01-reviewer-ai: "claude-sonnet-4-5"
    r01-reviewer-panel: "claude-opus-4-5"
    r01-reviser: "claude-opus-4-5"
    r01-figures: "claude-sonnet-4-5"
    r01-budget: "claude-sonnet-4-5"
    r01-foa-finder: "claude-sonnet-4-5"   # search-heavy, Sonnet is cost-effective

# ---------------------------------------------------------------------------
# Figma Configuration
# The pipeline uses Figma MCP for bidirectional sync: reading design context,
# component metadata, and exporting figure frames for proposal inclusion.
# For frames not in Figma, the pipeline generates figures via matplotlib.
# Set enabled: true and provide file_key to activate.
# frame_mapping: explicit Figma node_id per figure. If omitted, the agent
# matches frames by name convention: "F{N} - Description".
# ---------------------------------------------------------------------------
figma_config:
  enabled: false
  file_key: null                     # from Figma URL: figma.com/file/FILE_KEY/...
  access_token_env: "FIGMA_TOKEN"    # env var name (never store token directly)
  export_scale: 3                    # 1-4x (3 ≈ 300 DPI)
  frame_mapping: {}                  # e.g., {F1: "1:23", F3: "4:56"}

# ---------------------------------------------------------------------------
# Prior NIH R01 Examples
# Folder names relative to PriorNIHR01Examples/.
# The literature and writing agents will reference these for style and structure.
# ---------------------------------------------------------------------------
prior_examples:
  - "2025PostSurgery"
  - "2024YouthConcussion"
  - "2024Cardiotoxic"
  - "2023Sepsis"

# ---------------------------------------------------------------------------
# Checkpoint Mode
# Defines the channel through which user feedback arrives at review gates.
# "slack"  — orchestrator posts to Slack and waits for human reply
# "file"   — orchestrator writes a checkpoint file and polls for a response file
# ---------------------------------------------------------------------------
checkpoint_mode: "slack"

# ---------------------------------------------------------------------------
# Pipeline Settings
# ---------------------------------------------------------------------------
pipeline:
  max_review_rounds: 2             # revision loop cap before forced export
  parallel_writing: true           # run domain writers concurrently per aim
  parallel_figures_budget: true    # run r01-figures and r01-budget concurrently
  literature_max_papers: 40        # max papers fetched by r01-literature
  literature_recency_years: 5      # prefer papers published within N years
